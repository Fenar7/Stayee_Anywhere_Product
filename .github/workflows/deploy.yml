name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: staye-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 via AWS SSM
        run: |
          cat << 'EOF' > ssm-input.json
          {
            "DocumentName": "AWS-RunShellScript",
            "InstanceIds": ["${{ secrets.EC2_INSTANCE_ID }}"],
            "Parameters": {
              "commands": [
                "#!/bin/bash",
                "set -e",
                "echo 'Deploying latest staye-backend...'",
                "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
                "echo 'Cleaning up old docker images to free disk space...'",
                "docker system prune -af",
                "docker pull ${{ steps.login-ecr.outputs.registry }}/staye-backend:latest",
                "docker stop staye-api || true",
                "docker rm staye-api || true",
                "echo 'Fetching secrets from SSM...'",
                "export DATABASE_URL=$(aws ssm get-parameter --name /staye/prod/DATABASE_URL --with-decryption --query Parameter.Value --output text)",
                "export NEXTAUTH_SECRET=$(aws ssm get-parameter --name /staye/prod/NEXTAUTH_SECRET --with-decryption --query Parameter.Value --output text)",
                "export NEXTAUTH_URL=$(aws ssm get-parameter --name /staye/prod/NEXTAUTH_URL --with-decryption --query Parameter.Value --output text)",
                "export COGNITO_CLIENT_ID=$(aws ssm get-parameter --name /staye/prod/COGNITO_CLIENT_ID --with-decryption --query Parameter.Value --output text)",
                "export COGNITO_CLIENT_SECRET=$(aws ssm get-parameter --name /staye/prod/COGNITO_CLIENT_SECRET --with-decryption --query Parameter.Value --output text)",
                "export COGNITO_ISSUER=$(aws ssm get-parameter --name /staye/prod/COGNITO_ISSUER --with-decryption --query Parameter.Value --output text)",
                "export S3_BUCKET_NAME=$(aws ssm get-parameter --name /staye/prod/S3_BUCKET_NAME --with-decryption --query Parameter.Value --output text)",
                "echo 'Running Database Migrations...'",
                "docker run --rm -e DATABASE_URL=$DATABASE_URL ${{ steps.login-ecr.outputs.registry }}/staye-backend:latest prisma migrate deploy",
                "echo 'Seeding initial data (skips if data already exists)...'",
                "docker run --rm -e DATABASE_URL=$DATABASE_URL -e COGNITO_ISSUER=$COGNITO_ISSUER -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} -e AWS_REGION=ap-south-1 ${{ steps.login-ecr.outputs.registry }}/staye-backend:latest node scripts/seed-prod.mjs",
                "echo 'Running Docker container with CloudWatch logs...'",
                "docker run -d --name staye-api -p 80:3000 --restart unless-stopped --log-driver=awslogs --log-opt awslogs-region=ap-south-1 --log-opt awslogs-group=/hostel/prod/app --log-opt awslogs-create-group=true -e DATABASE_URL=$DATABASE_URL -e NEXTAUTH_SECRET=$NEXTAUTH_SECRET -e NEXTAUTH_URL=$NEXTAUTH_URL -e COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID -e COGNITO_CLIENT_SECRET=$COGNITO_CLIENT_SECRET -e COGNITO_ISSUER=$COGNITO_ISSUER -e AWS_S3_BUCKET_NAME=$S3_BUCKET_NAME ${{ steps.login-ecr.outputs.registry }}/staye-backend:latest",
                "echo 'Waiting 10s for container to stabilize...'",
                "sleep 10",
                "echo '--- Container Status ---'",
                "if ! docker ps | grep -q staye-api; then echo 'CONTAINER CRASHED:'; docker logs staye-api; exit 1; fi",
                "echo '--- Container Logs (last 100 lines) ---'",
                "docker logs staye-api --tail 100 2>&1 || echo 'Could not fetch logs'"
              ]
            }
          }
          EOF
          COMMAND_ID=$(aws ssm send-command --cli-input-json file://ssm-input.json --query "Command.CommandId" --output text)
          echo "Sent command $COMMAND_ID. Waiting for execution to complete..."
          
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true
          
          echo "--- Standard Output ---"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text || true
          
          echo "--- Standard Error ---"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text || true
